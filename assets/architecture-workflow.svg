<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#3a1d6e"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Arkaplan -->
  <rect width="800" height="520" fill="#0a0a1a" rx="12"/>

  <!-- Başlık -->
  <rect x="0" y="0" width="800" height="56" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="45" width="800" height="11" fill="url(#headerGrad)"/>
  <text x="400" y="36" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">🔬 Electron Reverse Engineering — İş Akışı Mimarisi</text>

  <!-- ASAR Extract Kutucuğu -->
  <rect x="300" y="76" width="200" height="44" rx="10" fill="url(#boxGrad1)" filter="url(#shadow)"/>
  <text x="400" y="103" text-anchor="middle" fill="#a8d8ea" font-size="13" font-weight="bold">📦 ASAR Extract</text>
  <text x="400" y="118" text-anchor="middle" fill="#6a8caf" font-size="9">npx asar extract app.asar ./src</text>

  <!-- Ok Aşağı -->
  <line x1="400" y1="120" x2="400" y2="152" stroke="#533483" stroke-width="2.5"/>
  <polygon points="400,155 394,145 406,145" fill="#533483"/>

  <!-- Karar Noktası: Source Map? -->
  <rect x="280" y="155" width="240" height="38" rx="19" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="176" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">📄 Source Map Var mı?</text>
  <text x="400" y="190" text-anchor="middle" fill="#555" font-size="9">find . -name "*.js.map"</text>

  <!-- EVET kolu (sol) -->
  <line x1="280" y1="174" x2="120" y2="174" stroke="#2ecc71" stroke-width="2"/>
  <line x1="120" y1="174" x2="120" y2="220" stroke="#2ecc71" stroke-width="2"/>
  <polygon points="120,223 114,213 126,213" fill="#2ecc71"/>
  <text x="200" y="168" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="bold">Evet 🟢</text>

  <!-- %100 Restore -->
  <rect x="30" y="225" width="180" height="52" rx="10" fill="#1b4332" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="120" y="246" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">✅ %100 Orijinal Kod</text>
  <text x="120" y="262" text-anchor="middle" fill="#6a8caf" font-size="9">source-map ile restore</text>
  <text x="120" y="274" text-anchor="middle" fill="#4a6a5a" font-size="8">"sourceContentFor()" → dosyalar</text>

  <!-- HAYIR kolu (sağ) -->
  <line x1="520" y1="174" x2="680" y2="174" stroke="#e67e22" stroke-width="2"/>
  <line x1="680" y1="174" x2="680" y2="220" stroke="#e67e22" stroke-width="2"/>
  <polygon points="680,223 674,213 686,213" fill="#e67e22"/>
  <text x="600" y="168" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">Hayır 🔶</text>

  <!-- Format Tespit -->
  <rect x="590" y="225" width="180" height="52" rx="10" fill="#3a2a1a" stroke="#e67e22" stroke-width="1.5"/>
  <text x="680" y="246" text-anchor="middle" fill="#f0b27a" font-size="13" font-weight="bold">🔍 Format Tespiti</text>
  <text x="680" y="262" text-anchor="middle" fill="#6a8caf" font-size="9">webpack? obfuscator.io?</text>
  <text x="680" y="274" text-anchor="middle" fill="#4a5a4a" font-size="8">head -20 main.js</text>

  <!-- 6 Seviyeli Pipeline kutuları -->
  <rect x="400" y="296" width="380" height="5" rx="2" fill="#533483" opacity="0.5"/>

  <!-- Seviye 1: webcrack -->
  <rect x="410" y="310" width="170" height="46" rx="8" fill="#0f3460" filter="url(#shadow)"/>
  <text x="495" y="328" text-anchor="middle" fill="#a8d8ea" font-size="11" font-weight="bold">⚡ webcrack 🥇</text>
  <text x="495" y="344" text-anchor="middle" fill="#6a8caf" font-size="9">Unpack + Deobfuscate</text>
  <text x="495" y="354" text-anchor="middle" fill="#4a6a8a" font-size="8">%100 syntax • %100 exec</text>

  <!-- Ok -->
  <line x1="580" y1="333" x2="610" y2="333" stroke="#533483" stroke-width="1.5"/>
  <polygon points="612,333 606,329 606,337" fill="#533483"/>

  <!-- Seviye 2: JSimplifier -->
  <rect x="615" y="310" width="170" height="46" rx="8" fill="#16213e" stroke="#533483" stroke-width="1"/>
  <text x="700" y="328" text-anchor="middle" fill="#a8d8ea" font-size="11" font-weight="bold">🧪 JSimplifier 🏆</text>
  <text x="700" y="344" text-anchor="middle" fill="#6a8caf" font-size="9">SOTA (NDSS 2026)</text>
  <text x="700" y="354" text-anchor="middle" fill="#4a6a8a" font-size="8">20/20 teknik • %466 readability</text>

  <!-- Diğer seçenekler -->
  <rect x="30" y="310" width="170" height="32" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="115" y="330" text-anchor="middle" fill="#999" font-size="10">humanify (LLM rename)</text>

  <rect x="30" y="348" width="170" height="32" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="115" y="368" text-anchor="middle" fill="#999" font-size="10">de4js / REstringer</text>

  <rect x="30" y="386" width="170" height="32" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="115" y="406" text-anchor="middle" fill="#999" font-size="10">Ghidra + ghidra_nodejs</text>

  <!-- Büyük ok aşağı -->
  <line x1="400" y1="365" x2="400" y2="410" stroke="#e94560" stroke-width="2.5"/>
  <polygon points="400,413 394,403 406,403" fill="#e94560"/>

  <!-- Patch + Repack -->
  <rect x="280" y="415" width="240" height="44" rx="10" fill="url(#boxGrad3)" filter="url(#shadow)"/>
  <text x="400" y="436" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🛠️ Değişiklik Yap → Repack</text>
  <text x="400" y="452" text-anchor="middle" fill="#ffb3b3" font-size="9">asar pack decoded/ app.asar</text>

  <!-- Integrity Bypass -->
  <line x1="400" y1="459" x2="400" y2="470" stroke="#e94560" stroke-width="2"/>
  <polygon points="400,473 394,463 406,463" fill="#e94560"/>

  <rect x="250" y="473" width="300" height="32" rx="16" fill="#1b1b2e" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="400" y="493" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">🔐 ASAR Integrity Bypass → Info.plist / sed / patcher</text>

  <text x="400" y="515" text-anchor="middle" fill="#555" font-size="9">Her adımda yedek almayı unutma!</text>
</svg>
